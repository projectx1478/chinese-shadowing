// ══ API ══════════════════════════════════════════════════
function getKey(){return (document.getElementById("api-key")?.value||"").trim();}

// Model priority: 2.0-flash-lite first (より制限が緩い), fallback to 2.5-flash
const GEMINI_MODELS = [
  "gemini-2.0-flash-lite",  // より無料枠が大きい
  "gemini-2.5-flash-lite-preview-06-17",
  "gemini-2.5-flash",
];

async function callGeminiModel(model, body) {
  const key = getKey();
  if (!key) throw new Error("APIキーが入力されていません");
  let res, raw, data;
  try {
    res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,
      {method:"POST", headers:{"Content-Type":"application/json","x-goog-api-key":key}, body:JSON.stringify(body)}
    );
    raw = await res.text();
    data = raw.trim().startsWith("{") ? JSON.parse(raw) : null;
  } catch(e) {
    throw new Error(`通信エラー: ${e.message}`);
  }
  const errMsg = data?.error?.message || "";
  const errStatus = data?.error?.status || "";
  console.log(`[${model}] status=${res.status} errStatus=${errStatus} errMsg=${errMsg}`);
  if (!data) throw new Error(`非JSONレスポンス(${res.status}): ${raw.slice(0,200)}`);
  if (res.status === 429 || errStatus === "RESOURCE_EXHAUSTED" ||
      /quota|rate.?limit|resource.?exhausted/i.test(errMsg)) {
    const err = new Error(errMsg || "quota");
    err.isQuota = true; throw err;
  }
  if (res.status === 503 || /overload|unavailable|high.?demand/i.test(errMsg)) {
    const err = new Error("overloaded");
    err.isOverload = true; throw err;
  }
  if (!res.ok) throw new Error(`[${model}] HTTP ${res.status}: ${errMsg || errStatus || raw.slice(0,200)}`);
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
  if (!text) throw new Error(`[${model}] レスポンスが空: ${JSON.stringify(data).slice(0,200)}`);
  return text;
}

async function gemini(messages, system) {
  const body = {
    system_instruction: system ? {parts:[{text:system}]} : undefined,
    contents: messages.map(m=>({
      role: m.role==="assistant" ? "model" : "user",
      parts: Array.isArray(m.content)
        ? m.content.map(c => c.type==="text" ? {text:c.text} : {inline_data:{mime_type:c.mime,data:c.data}})
        : [{text:m.content}]
    })),
    generationConfig: {maxOutputTokens:1024, temperature:0.7}
  };
  const errors = [];
  for (const model of GEMINI_MODELS) {
    for (let attempt=1; attempt<=2; attempt++) {
      try {
        return await callGeminiModel(model, body);
      } catch(e) {
        errors.push(`${model}(試行${attempt}): ${e.message}`);
        if (e.isQuota) break;
        if (e.isOverload && attempt < 2) {
          await new Promise(r=>setTimeout(r, attempt*3000)); continue;
        }
        if (!e.isQuota && !e.isOverload) break;
      }
    }
  }
  // 全てのAPIが失敗した場合、エラーを投げる
  throw new Error("API制限に達しました。\n" + errors.join("\n"));
}

// ══ 事前文プールからランダムに文を選択 ═════════════════
function getPremadeSentence(topic) {
  const pool = topic && PREMADE_SENTENCES[topic] ? PREMADE_SENTENCES[topic] : ALL_PREMADE;
  // 既に使った文を避ける（使った文が多くなったらリセット）
  const available = pool.filter(item => !S.used.includes(item.zh));
  if (available.length === 0) {
    S.used = []; // リセット
    return pool[Math.floor(Math.random() * pool.length)];
  }
  return available[Math.floor(Math.random() * available.length)];
}

async function generateSentence(){
  // APIエラーが連続3回以上発生したら、事前文プールに自動切り替え
  if (S.apiErrorCount >= 3) {
    console.log("APIエラー連続のため、事前文プールを使用");
    const premade = getPremadeSentence(S.topic);
    return {
      zh: premade.zh,
      py: premade.py,
      ja: premade.ja,
      partner: "",
      partnerJa: "",
      fromPremade: true
    };
  }

  // まずAPIで試行（HSK優先度がオンの場合のみ）
  if (S.hskPrio) {
    try {
      return await generateSentenceWithAPI();
    } catch(e) {
      console.warn("API文生成失敗:", e.message);
      S.apiErrorCount++;
      // エラー時は事前文プールにフォールバック
      const premade = getPremadeSentence(S.topic);
      return {
        zh: premade.zh,
        py: premade.py,
        ja: premade.ja,
        partner: "",
        partnerJa: "",
        fromPremade: true
      };
    }
  } else {
    // HSK優先度がオフの場合は、必ず事前文プールを使用（APIを使わない）
    const premade = getPremadeSentence(S.topic);
    return {
      zh: premade.zh,
      py: premade.py,
      ja: premade.ja,
      partner: "",
      partnerJa: "",
      fromPremade: true
    };
  }
}

async function generateSentenceWithAPI(){
  const lvMap={hsk3:"HSK3級（15字以内）",hsk4:"HSK4級（20字以内）",hsk5:"HSK5級（25字以内）",hsk6:"HSK6級（30字以内）"};
  const hskHint=S.hskPrio?`\n返答文にHSK重要単語を1〜2個含めること：${HSK5_WORDS.sort(()=>Math.random()-.5).slice(0,5).join("、")}`:"";
  const histLines=S.conversationHistory.slice(-5).map((h,i)=>`ターン${i+1}　相手：${h.partner}　返答：${h.zh}`).join("\n");
  const contextHint=histLines?`\n\n【これまでの会話（この続きを生成）】\n${histLines}`:"";
  const raw=await gemini([{role:"user",content:
    `中国語シャドーイング練習用の「会話セット」を生成してください。
レベル：${lvMap[S.level.id]}
トピック：${S.topic}${hskHint}${contextHint}

ルール：
・会話の文脈を踏まえた自然な次のターンを生成すること
・文脈がない場合は会話の冒頭から始めること
・「相手のセリフ」は状況や質問を提示する1文
・「返答」は学習者がシャドーイングする1文（レベルに合った自然な返答）
・前のターンと全く同じ内容・表現は避けること

出力形式（厳守）：
相手：<相手のセリフ（漢字のみ）>
相手訳：<相手のセリフの日本語訳>
返答：<返答文（漢字のみ）>
拼音：<返答文の声調記号付きピンイン>
訳：<返答文の日本語訳>`}]);
  const partner   = raw.match(/相手[：:]\s*(.+)/)?.[1]?.trim() || "";
  const partnerJa = raw.match(/相手訳[：:]\s*(.+)/)?.[1]?.trim() || "";
  const zh        = raw.match(/返答[：:]\s*(.+)/)?.[1]?.trim();
  const py        = raw.match(/拼音[：:]\s*(.+)/)?.[1]?.trim() || "";
  const ja        = raw.match(/訳[：:]\s*(.+)/)?.[1]?.trim() || "";
  if(!zh) throw new Error("生成失敗: "+raw.slice(0,80));
  S.apiErrorCount = 0; // 成功したらリセット
  return { zh, py, ja, partner, partnerJa, fromPremade: false };
}

async function reviewRecording(blob){
  const ab=await blob.arrayBuffer();
  const bytes=new Uint8Array(ab);
  let bin="";for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  const b64=btoa(bin);
  const mime=blob.type||"audio/webm";
  const raw=await gemini([{role:"user",content:[
    {type:"text",text:`シャドーイング練習の録音です。
お手本：「${S.sentence.zh}」
拼音：「${S.sentence.py}」
レベル：${S.level.label}

1. 音声を文字起こし
2. 一致度を評価
3. 声調・発音のズレを具体的に指摘
4. 改善アドバイス

出力形式（厳守）：
認識：<文字起こし>
スコア：<1〜5>
一致率：<0〜100>
発音詳細：<声調ミス・発音のズレを具体的に日本語で>
総評：<日本語で2文程度>`},
    {type:"audio",mime,data:b64}
  ]}]);
  const recognized=raw.match(/認識[：:]\s*(.+)/)?.[1]?.trim()||"（認識できませんでした）";
  const score=Math.min(5,Math.max(1,parseInt(raw.match(/スコア[：:]\s*(\d)/)?.[1]||"3")));
  const match=Math.min(100,Math.max(0,parseInt(raw.match(/一致率[：:]\s*(\d+)/)?.[1]||"0")));
  const pronun=raw.match(/発音詳細[：:]\s*([\s\S]+?)(?=総評|$)/)?.[1]?.trim()||"";
  const feedback=raw.match(/総評[：:]\s*([\s\S]+)/)?.[1]?.trim()||raw;
  return{recognized,score,match,pronun,feedback};
}

// ══ TTS ══════════════════════════════════════════════════
// Web Speech APIを優先使用（完全無料）
async function speak(text, rate, onEnd){
  // 常にWeb Speech APIを使用（API消費をゼロに）
  speakWithWebSpeech(text, rate, onEnd);
}

// Gemini TTSは完全に無効化（API消費を減らすため）
// 代わりにWeb Speech APIを使用

function speakWithWebSpeech(text, rate, onEnd){
  if(!window.speechSynthesis){S.isSpeaking=false;onEnd?.();render();return;}
  window.speechSynthesis.cancel();
  const go=()=>{
    const u=new SpeechSynthesisUtterance(text);
    u.lang="zh-CN";u.rate=rate;u.pitch=1.0;
    const zh=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith("zh"));
    if(zh)u.voice=zh;
    const t=setTimeout(()=>{S.isSpeaking=false;onEnd?.();render();},Math.max(4000,text.length*400));
    u.onend=u.onerror=()=>{clearTimeout(t);S.isSpeaking=false;onEnd?.();render();};
    window.speechSynthesis.speak(u);
  };
  const voices=window.speechSynthesis.getVoices();
  if(voices.length>0)setTimeout(go,80);
  else{window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.onvoiceschanged=null;setTimeout(go,80);};setTimeout(go,800);}
}

// ダイアログ再生（Web Speech API使用）
async function speakDialog(partnerText, answerText, rate, onEnd) {
  S.isSpeaking=true; render();
  try {
    await new Promise(res=>speak(partnerText, rate, res));
    await new Promise(r=>setTimeout(r, 700));
    await new Promise(res=>speak(answerText, rate, res));
  } catch(e) { console.warn("speakDialog error:", e); }
  S.isSpeaking=false; onEnd?.(); render();
}

// ══ Recording ════════════════════════════════════════════
async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mime=["audio/webm","audio/mp4","audio/ogg"].find(m=>MediaRecorder.isTypeSupported(m))||"";
    const mr=new MediaRecorder(stream,mime?{mimeType:mime}:{});
    S.chunks=[];
    mr.ondataavailable=e=>{if(e.data.size>0)S.chunks.push(e.data);};
    mr.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      clearInterval(S.recTimer);
      if(!S.chunks.length){setPhase("record");showErr("録音データがありません");return;}
      const blob=new Blob(S.chunks,{type:mr.mimeType||"audio/webm"});
      S.recordedBlob=blob;
      if(S.recordedUrl)URL.revokeObjectURL(S.recordedUrl);
      S.recordedUrl=URL.createObjectURL(blob);
      setPhase("reviewing");render();
      try{
        S.result=await reviewRecording(blob);
        const histItem = {sentence:{...S.sentence},result:{...S.result},date:new Date().toISOString()};
        S.history.push(histItem);
        saveHistory(S.history);
        saveHistoryToCloud(histItem);
        S.used.push(S.sentence.zh);
        // Add to weak list if score <= 3
        if(S.result.score<=3){
          const already=S.weakList.some(w=>w.zh===S.sentence.zh);
          if(!already){
            S.weakList.push({zh:S.sentence.zh,py:S.sentence.py,ja:S.sentence.ja,score:S.result.score});
            saveWeakList(S.weakList);
          }
        }
        setPhase("result");
      }catch(e){
        S.result={recognized:"エラー",score:0,match:0,pronun:"",feedback:e.message};
        setPhase("result");
      }
      render();
    };
    mr.onerror=e=>{showErr("録音エラー: "+(e.error?.message||"不明"));setPhase("record");render();};
    mr.start(100);
    S.mediaRecorder=mr;S.recSeconds=0;
    S.recTimer=setInterval(()=>{S.recSeconds++;render();},1000);
    setPhase("recording");render();
  }catch(e){
    let msg;
    if(e.name==="NotAllowedError"||e.name==="PermissionDeniedError")
      msg="マイクの許可が必要です。\nChromeの場合：アドレスバー左の🔒→マイク→許可";
    else if(e.name==="NotFoundError") msg="マイクが見つかりません";
    else msg="マイクエラー: "+e.message;
    showErr(msg);
  }
}
function stopRecording(){if(S.mediaRecorder?.state==="recording")S.mediaRecorder.stop();clearInterval(S.recTimer);}
function stopAll(){window.speechSynthesis?.cancel();stopRecording();S.isSpeaking=false;}

// ══ Flow ═════════════════════════════════════════════════
function setPhase(p){S.phase=p;}
function showErr(msg){const el=document.getElementById("err-display");if(el){el.textContent=msg;el.classList.remove("hidden");}}

function stepIndex(){const m={listen:0,check:1,read:2,shadow:3,record:3,recording:3,reviewing:4,result:5};return m[S.phase]??0;}

async function loadSentence(resetConversation=false){
  stopAll();
  if(resetConversation) S.conversationHistory=[];
  S.sentence=null;S.result=null;S.showPinyin=false;S.showTrans=false;S.hideHanzi=false;S.repCount=0;
  S.recordedBlob=null;
  if(S.recordedUrl){URL.revokeObjectURL(S.recordedUrl);S.recordedUrl=null;}
  if(S.modelUrl){URL.revokeObjectURL(S.modelUrl);S.modelUrl=null;}
  setPhase("loading");render();
  try{
    if(S.customMode&&S.customSentence){
      S.sentence=S.customSentence;
    } else {
      S.sentence=await generateSentence();
    }
    setPhase("listen");
  }catch(e){setPhase("listen");setTimeout(()=>showErr(e.message),50);}
  render();
  if(S.sentence){
    S.isSpeaking=true;render();
    if(S.sentence.partner){
      speakDialog(S.sentence.partner, S.sentence.zh, S.speed, ()=>{});
    } else {
      speak(S.sentence.zh, S.speed, ()=>{});
    }
  }
}

function startPractice(){
  if(!S.customMode){ S.used=[]; S.conversationHistory=[]; }
  saveSettings();
  document.getElementById("top-badge").textContent=S.level.label;
  document.getElementById("top-badge").style.background=S.level.color;
  document.getElementById("top-topic").textContent=S.customMode?"カスタム文":S.topic;
  show("practice");
  loadSentence();
}

function retryRecord(){
  S.result=null;S.recordedBlob=null;
  if(S.recordedUrl){URL.revokeObjectURL(S.recordedUrl);S.recordedUrl=null;}
  setPhase("record");render();
}

function nextStep(){
  const order=["listen","check","read","shadow","record"];
  const i=order.indexOf(S.phase);
  if(i>=0&&i<order.length-1){setPhase(order[i+1]);if(order[i+1]==="record")S.hideHanzi=true;render();}
  else if(S.phase==="result"){
    if(S.sentence&&!S.customMode){
      S.conversationHistory.push({partner:S.sentence.partner||"", zh:S.sentence.zh});
      if(S.conversationHistory.length>10) S.conversationHistory.shift();
    }
    loadSentence();
  }
}

// ══ Render ════════════════════════════════════════════════
function starsHtml(n,total=5){return Array.from({length:total}).map((_,i)=>`<span style="color:${i<n?"#f0c040":"#ddd"}">★</span>`).join("");}
function matchColor(m){return m>=80?"#16a34a":m>=50?"#d97706":"#dc2626";}
function diffHtml(target, input) {
  if (!input) return `<span class="err">（認識なし）</span>`;
  const t = Array.from(target), s = Array.from(input);
  const dp = Array.from({length:t.length+1}, ()=>new Array(s.length+1).fill(0));
  for (let i=1;i<=t.length;i++) for (let j=1;j<=s.length;j++)
    dp[i][j] = t[i-1]===s[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j],dp[i][j-1]);
  const matched = new Set();
  let i=t.length, j=s.length;
  while(i>0&&j>0){
    if(t[i-1]===s[j-1]){matched.add(j-1);i--;j--;}
    else if(dp[i-1][j]>=dp[i][j-1])i--;else j--;
  }
  return s.map((c,idx)=>`<span class="${matched.has(idx)?"ok":"err"}">${c}</span>`).join("");
}

function renderRepDots(){
  const total=S.reps;
  let h=`<div class="repeat-counter"><div class="repeat-dots">`;
  for(let i=0;i<total;i++){
    const cls=i<S.repCount?"done":i===S.repCount?"active":"";
    h+=`<div class="rdot ${cls}"></div>`;
  }
  h+=`</div><span class="repeat-label">${S.repCount}/${total}回</span></div>`;
  return h;
}

function updateStats(){
  const el=document.getElementById("top-stats");if(!el)return;
  const n=S.history.length;if(!n){el.textContent="";return;}
  const avg=(S.history.reduce((s,h)=>s+h.result.score,0)/n).toFixed(1);
  el.textContent=`${n}文 avg ${avg}★`;
}

function renderStepBar(){
  const bar=document.getElementById("step-bar");if(!bar)return;
  const cur=stepIndex();let h="";
  STEPS.forEach((st,i)=>{
    const done=i<cur,active=i===cur;
    if(i>0)h+=`<div class="step-line${done?" done":""}"></div>`;
    h+=`<div class="step-item"><div class="step-dot${done?" done":active?" active":""}">${done?"✓":(i+1)}</div><div class="step-name${done?" done":active?" active":""}">${st.name}</div></div>`;
  });
  bar.innerHTML=h;
}

  if(ph==="shadow"&&s){

    html+=renderRepDots();
    if(s.partner){
      html+=`<button class="btn btn-dark" ${S.isSpeaking?"disabled":""} onclick="S.repCount=Math.min(S.reps,S.repCount+1);speakDialog(S.sentence.partner,S.sentence.zh,S.speed,()=>{})">
        ${S.isSpeaking?"🔊 再生中…":"🔊 会話を通して聞く（+1回）[Space]"}</button>`;
      html+=`<button class="btn" style="background:#6366f1;margin-top:6px" ${S.isSpeaking?"disabled":""} onclick="S.isSpeaking=true;S.repCount=Math.min(S.reps,S.repCount+1);render();speak(S.sentence.zh,S.speed,()=>{})">
        🔊 返答だけ聞く（+1回）</button>`;
    } else {
      html+=`<button class="btn btn-dark" ${S.isSpeaking?"disabled":""} onclick="S.isSpeaking=true;S.repCount=Math.min(S.reps,S.repCount+1);render();speak(S.sentence.zh,S.speed,()=>{})">
        ${S.isSpeaking?"🔊 再生中…":"🔊 再生（+1回）[Space]"}</button>`;
    }
    html+=`<button class="btn btn-red" style="margin-top:8px" onclick="setPhase('record');S.hideHanzi=true;render()">次へ：録音へ → [→]</button>`;
  }
  if(ph==="record"&&s){
    html+=`<div class="step-instruction"><span class="step-num">⑤録音</span>　相手のセリフへの返答として、自然に声に出して録音してください。</div>`;
    html+=`<button class="btn btn-red" onclick="startRecording()">🎤 録音開始 [R]</button>`;
  }
  if(ph==="recording"){
    html+=`<div class="rec-status"><span class="rec-dot"></span><span class="rec-label">録音中 ${S.recSeconds}秒</span></div>`;
    html+=`<p style="font-size:13px;color:#777;text-align:center;margin:4px 0 8px">お手本の文を声に出して読んでください</p>`;
    html+=`<button class="btn btn-stop" onclick="stopRecording()">⏹ 録音停止・送信 [R]</button>`;
  }
  if(ph==="reviewing"){
    html+=`<div class="loading-box"><div class="spinner"></div><span style="color:#aaa;font-size:13px">音声を解析・採点中…</span></div>`;
  }
  if(ph==="result"&&S.result){
    const r=S.result;
    html+=`<div class="score-row"><div style="font-size:22px">${starsHtml(r.score)} <span style="font-size:14px;color:#888">${r.score}/5</span></div>
      <div class="match-pct">一致率 <span style="font-weight:700;color:${matchColor(r.match)}">${r.match}%</span></div></div>`;
    // Audio comparison
    html+=`<div class="audio-row">`;
    if(S.modelUrl)html+=`<div class="audio-item"><div class="audio-label">🎙 手本</div><audio controls src="${S.modelUrl}"></audio></div>`;
    if(S.recordedUrl)html+=`<div class="audio-item"><div class="audio-label">🎤 自分の録音</div><audio controls src="${S.recordedUrl}"></audio></div>`;
    html+=`</div>`;
    html+=`<div class="diff-box">
      <div class="diff-label">認識された発音</div>
      <div class="diff-text">${diffHtml(s?.zh||"",r.recognized)}</div>
      <div class="diff-label" style="margin-top:8px">お手本</div>
      <div class="diff-text diff-target">${s?.zh||""}</div>
    </div>`;
    if(r.pronun)html+=`<div class="pronun-box"><div class="pronun-title">🎵 発音・声調の詳細</div><div class="pronun-text">${r.pronun}</div></div>`;
    html+=`<div class="feedback-box"><div class="feedback-title">💬 総評・アドバイス</div><div class="feedback-text">${r.feedback}</div></div>`;
    html+=`<div class="btn-row">
      <button class="btn btn-gray" onclick="retryRecord()">⟳ 録り直す</button>
      <button class="btn" style="background:${S.level.color}" onclick="loadSentence()">次の文 → [N]</button>
    </div>`;
  }
  html+=`</div>`;

  // History
  if(S.history.length>0){
    html+=`<div class="history-wrap"><div class="history-label">HISTORY</div>`;
    [...S.history].reverse().slice(0,10).forEach(h=>{
      const d=h.date?new Date(h.date).toLocaleDateString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}):"";
      html+=`<div class="history-item">
        <div class="history-zh">${h.sentence.zh}<span style="font-size:11px;color:#ccc;margin-left:8px">${d}</span></div>
        <div class="history-meta"><span>${starsHtml(h.result.score)}</span><span style="color:${matchColor(h.result.match)};font-weight:600">${h.result.match}%</span><span>${h.result.recognized}</span></div>
      </div>`;
    });
    html+=`</div>`;
  }

  body.innerHTML=html;
  if(ph==="result")body.scrollTop=body.scrollHeight;
}

// ══ Keyboard shortcuts ═══════════════════════════════════
document.addEventListener("keydown",e=>{
  if(["INPUT","TEXTAREA"].includes(e.target.tagName))return;
  const ph=S.phase;
  if(e.code==="Space"){
    e.preventDefault();
    if(!S.isSpeaking&&S.sentence&&["listen","check","read","shadow"].includes(ph)){
      S.isSpeaking=true;
      if(ph==="shadow") S.repCount=Math.min(S.reps,S.repCount+1);
      render();
      if(S.sentence.partner && ph!=="shadow"){
        speakDialog(S.sentence.partner, S.sentence.zh, S.speed, ()=>{});
      } else {
        speak(S.sentence.zh, S.speed, ()=>{});
      }
    }
  }
  if(e.code==="ArrowRight"){nextStep();}
  if(e.key==="r"||e.key==="R"){
    if(ph==="record")startRecording();
    else if(ph==="recording")stopRecording();
  }
  if(e.key==="p"||e.key==="P"){S.showPinyin=!S.showPinyin;render();}
  if(e.key==="t"||e.key==="T"){S.showTrans=!S.showTrans;render();}
  if(e.key==="h"||e.key==="H"){S.hideHanzi=!S.hideHanzi;render();}
  if((e.key==="n"||e.key==="N")&&ph==="result"){loadSentence();}
});

// ── ローカル履歴をFirestoreにマイグレーション ───────────
async function migrateLocalHistoryToCloud() {
  if (!currentUser) return;
  const localHistory = loadHistory();
  if (!localHistory.length) return;
  try {
    const existingSnap = await userDoc("history").limit(1).get();
    const hasCloudData = !existingSnap.empty;
    if (!hasCloudData) {
      const batch = db.batch();
      let count = 0;
      for (const item of localHistory) {
        if (count >= 500) break;
        const ref = userDoc("history").doc();
        const date = item.date ? new Date(item.date) : new Date();
        batch.set(ref, {
          sentence: item.sentence,
          result: item.result,
          date: item.date || date.toISOString(),
          createdAt: firebase.firestore.Timestamp.fromDate(date),
          migratedFromLocal: true
        });
        count++;
      }
      await batch.commit();
      console.log(`ローカル履歴 ${count}件 をクラウドにアップロードしました`);
    } else {
      const cloudSnap = await userDoc("history").orderBy("createdAt","desc").limit(500).get();
      const cloudDates = new Set(cloudSnap.docs.map(d => d.data().date).filter(Boolean));
      const toUpload = localHistory.filter(item => item.date && !cloudDates.has(item.date));
      if (toUpload.length > 0) {
        const batch = db.batch();
        for (const item of toUpload.slice(0, 500)) {
          const ref = userDoc("history").doc();
          const date = new Date(item.date);
          batch.set(ref, {
            sentence: item.sentence,
            result: item.result,
            date: item.date,
            createdAt: firebase.firestore.Timestamp.fromDate(date),
            migratedFromLocal: true
          });
        }
        await batch.commit();
        console.log(`未同期のローカル履歴 ${toUpload.length}件 をアップロードしました`);
      }
    }
  } catch(e) {
    console.warn("履歴のマイグレーション失敗:", e.message);
  }
}

// ── Firestore paths ─────────────────────────────────────
function userDoc(path) {
  if (!currentUser) return null;
  return db.collection("users").doc(currentUser.uid).collection(path);
}

// ── Save to Firestore ───────────────────────────────────
async function saveHistoryToCloud(historyItem) {
  if (!currentUser) return;
  try {
    await userDoc("history").add({
      ...historyItem,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) { console.warn("履歴の保存失敗:", e.message); }
}

async function saveWeakListToCloud() {
  if (!currentUser) return;
  try {
    await db.collection("users").doc(currentUser.uid)
      .set({ weakList: S.weakList }, { merge: true });
  } catch(e) { console.warn("苦手リストの保存失敗:", e.message); }
}

async function saveSavedSetsToCloud() {
  if (!currentUser) return;
  try {
    await db.collection("users").doc(currentUser.uid)
      .set({ savedSets: loadSavedSets() }, { merge: true });
  } catch(e) { console.warn("セット保存失敗:", e.message); }
}

async function saveSettingsToCloud() {
  if (!currentUser) return;
  try {
    await db.collection("users").doc(currentUser.uid).set({
      settings: { levelId: S.level.id, topic: S.topic, speed: S.speed, reps: S.reps, hskPrio: S.hskPrio }
    }, { merge: true });
  } catch(e) { console.warn("設定の保存失敗:", e.message); }
}

// ── Load from Firestore ─────────────────────────────────
async function loadFromFirestore() {
  if (!currentUser) return;
  try {
    const userSnap = await db.collection("users").doc(currentUser.uid).get();
    if (userSnap.exists) {
      const data = userSnap.data();
      if (data.weakList)  { S.weakList = data.weakList;  saveWeakList(S.weakList); }
      if (data.savedSets) { saveSavedSets(data.savedSets); }
      if (data.settings) {
        const sv = data.settings;
        if (sv.levelId) S.level = LEVELS.find(l=>l.id===sv.levelId) || S.level;
        if (sv.topic && TOPICS.includes(sv.topic)) S.topic = sv.topic;
        if (sv.speed)   S.speed  = sv.speed;
        if (sv.reps)    S.reps   = sv.reps;
        if (sv.hskPrio !== undefined) S.hskPrio = sv.hskPrio;
        document.getElementById("speed-slider").value = S.speed;
        document.getElementById("speed-val").textContent = Math.round(S.speed*100)+"%";
        setReps(S.reps);
        setPrio(S.hskPrio);
      }
    }
    const histSnap = await userDoc("history")
      .orderBy("createdAt","desc").limit(300).get();
    if (!histSnap.empty) {
      const cloudHistory = histSnap.docs.map(d => {
        const data = d.data();
        return { sentence: data.sentence, result: data.result, date: data.date };
      }).reverse();
      const localHistory = loadHistory();
      const cloudDates = new Set(cloudHistory.map(h => h.date).filter(Boolean));
      const localOnly = localHistory.filter(h => !h.date || !cloudDates.has(h.date));
      const merged = [...localOnly, ...cloudHistory]
        .filter(h => h.sentence && h.result)
        .sort((a,b) => new Date(a.date||0) - new Date(b.date||0))
        .slice(-300);
      S.history = merged;
      saveHistory(S.history);
    }
  } catch(e) { console.warn("クラウドデータの読み込み失敗:", e.message); }
}
